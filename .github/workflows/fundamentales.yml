name: ENGINE-FUNDAMENTALES
on:
  schedule:
    - cron: '0 0-21 * * *' # Cada hora de 00:00 a 21:00 (22 ejecuciones/día)
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install mysql-connector-python requests yfinance
      - name: Run
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        working-directory: ./pythonProject  
        run: python loader_fundamentales.py